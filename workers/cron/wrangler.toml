# Tiny standalone Cloudflare Worker with two jobs: it fires the docolin cron
# endpoints on a schedule, and it consumes the sync queue (the main app can't host
# a queue() handler, since adapter-cloudflare only emits a fetch handler). Each
# queue message triggers one drain chunk on the app via /api/sync/drain. Lives
# outside the main project because that adapter supports neither cron nor queues.
#
# Deploy:        bunx wrangler deploy -c workers/cron/wrangler.toml
# Set secret:    bunx wrangler secret put CRON_SECRET -c workers/cron/wrangler.toml
# Tail logs:     bunx wrangler tail -c workers/cron/wrangler.toml
# Test locally:  bunx wrangler dev -c workers/cron/wrangler.toml --test-scheduled
#                then GET http://localhost:8787/__scheduled to fire one tick

name = "docolin-cron"
main = "index.ts"
compatibility_date = "2026-05-17"

# Every 15 minutes. Each job drains a bounded batch within the tick's budget
# (e.g. embed-versions does up to 50 versions) and defers the rest to the next
# tick; most ticks are no-ops once content is steady.
[triggers]
crons = ["*/15 * * * *"]

[vars]
# Public origin of the docolin Pages deployment. Override per environment
# if you split prod/staging later. CRON_SECRET goes in via `wrangler secret put`,
# not here (secrets must not be in version-controlled config).
DOCOLIN_BASE_URL = "https://docolin.com"

# Consume the sync queue: each message is one { gitSourceId } trigger. The handler
# calls /api/sync/drain (which drains one chunk and re-enqueues itself while work
# remains). A failed delivery retries with backoff up to max_retries, then lands
# in the dead-letter queue for inspection. Create the queues once with:
#   bunx wrangler queues create docolin-sync
#   bunx wrangler queues create docolin-sync-dlq
[[queues.consumers]]
queue = "docolin-sync"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "docolin-sync-dlq"
